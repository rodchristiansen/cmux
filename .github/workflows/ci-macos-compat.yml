name: macOS Compatibility

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  compat-tests-macos-15-attempt-1:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    continue-on-error: true
    runs-on: warp-macos-15-arm64-6x
    timeout-minutes: 45
    outputs:
      completed: ${{ steps.compat.outputs.completed }}
      passed: ${{ steps.compat.outputs.passed }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Run macOS 15 compatibility attempt
        id: compat
        uses: ./.github/actions/run-macos-compat-check
        with:
          os_label: warp-macos-15-arm64-6x
          skip_zig: "false"
          smoke: "true"
          compat_test_filters: |
            -only-testing:cmuxTests/AppDelegateLaunchServicesRegistrationTests
            -only-testing:cmuxTests/BrowserPaneDropRoutingTests
            -only-testing:cmuxTests/CJKIMEShortcutBypassTests
            -only-testing:cmuxTests/NotificationMenuSnapshotBuilderTests
            -only-testing:cmuxTests/SidebarSelectedWorkspaceColorTests
            -only-testing:cmuxTests/TerminalDirectoryOpenTargetAvailabilityTests
            -only-testing:cmuxTests/WorkspaceAutoReorderSettingsTests
            -only-testing:cmuxTests/WorkspaceTerminalFocusRecoveryTests

  compat-tests-macos-15-attempt-2:
    if: ${{ always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && needs.compat-tests-macos-15-attempt-1.outputs.completed != 'true' && needs.compat-tests-macos-15-attempt-1.outputs.passed != 'true' }}
    needs:
      - compat-tests-macos-15-attempt-1
    continue-on-error: true
    runs-on: warp-macos-15-arm64-6x
    timeout-minutes: 45
    outputs:
      completed: ${{ steps.compat.outputs.completed }}
      passed: ${{ steps.compat.outputs.passed }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Run macOS 15 compatibility attempt
        id: compat
        uses: ./.github/actions/run-macos-compat-check
        with:
          os_label: warp-macos-15-arm64-6x
          skip_zig: "false"
          smoke: "true"
          compat_test_filters: |
            -only-testing:cmuxTests/AppDelegateLaunchServicesRegistrationTests
            -only-testing:cmuxTests/BrowserPaneDropRoutingTests
            -only-testing:cmuxTests/CJKIMEShortcutBypassTests
            -only-testing:cmuxTests/NotificationMenuSnapshotBuilderTests
            -only-testing:cmuxTests/SidebarSelectedWorkspaceColorTests
            -only-testing:cmuxTests/TerminalDirectoryOpenTargetAvailabilityTests
            -only-testing:cmuxTests/WorkspaceAutoReorderSettingsTests
            -only-testing:cmuxTests/WorkspaceTerminalFocusRecoveryTests

  compat-tests-macos-26-attempt-1:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    continue-on-error: true
    runs-on: warp-macos-26-arm64-6x
    timeout-minutes: 45
    outputs:
      completed: ${{ steps.compat.outputs.completed }}
      passed: ${{ steps.compat.outputs.passed }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Run macOS 26 compatibility attempt
        id: compat
        uses: ./.github/actions/run-macos-compat-check
        with:
          os_label: warp-macos-26-arm64-6x
          skip_zig: "true"
          smoke: "false"
          compat_test_filters: |
            -only-testing:cmuxTests/BrowserPanelAddressBarFocusRequestTests
            -only-testing:cmuxTests/CmuxCLIPathInstallerTests
            -only-testing:cmuxTests/GhosttyConfigTests
            -only-testing:cmuxTests/OmnibarRemoteSuggestionMergeTests
            -only-testing:cmuxTests/SidebarWidthPolicyTests
            -only-testing:cmuxTests/TerminalKeyboardCopyModeActionTests
            -only-testing:cmuxTests/WorkspaceBrowserProfileSelectionTests
            -only-testing:cmuxTests/ZshShellIntegrationHandoffTests

  compat-tests-macos-26-attempt-2:
    if: ${{ always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && needs.compat-tests-macos-26-attempt-1.outputs.completed != 'true' && needs.compat-tests-macos-26-attempt-1.outputs.passed != 'true' }}
    needs:
      - compat-tests-macos-26-attempt-1
    continue-on-error: true
    runs-on: warp-macos-26-arm64-6x
    timeout-minutes: 45
    outputs:
      completed: ${{ steps.compat.outputs.completed }}
      passed: ${{ steps.compat.outputs.passed }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Run macOS 26 compatibility attempt
        id: compat
        uses: ./.github/actions/run-macos-compat-check
        with:
          os_label: warp-macos-26-arm64-6x
          skip_zig: "true"
          smoke: "false"
          compat_test_filters: |
            -only-testing:cmuxTests/BrowserPanelAddressBarFocusRequestTests
            -only-testing:cmuxTests/CmuxCLIPathInstallerTests
            -only-testing:cmuxTests/GhosttyConfigTests
            -only-testing:cmuxTests/OmnibarRemoteSuggestionMergeTests
            -only-testing:cmuxTests/SidebarWidthPolicyTests
            -only-testing:cmuxTests/TerminalKeyboardCopyModeActionTests
            -only-testing:cmuxTests/WorkspaceBrowserProfileSelectionTests
            -only-testing:cmuxTests/ZshShellIntegrationHandoffTests

  compat-tests:
    if: ${{ always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    needs:
      - compat-tests-macos-15-attempt-1
      - compat-tests-macos-15-attempt-2
      - compat-tests-macos-26-attempt-1
      - compat-tests-macos-26-attempt-2
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_label: warp-macos-15-arm64-6x
            check_name: warp-macos-15-arm64-6x, 45, true, false, -only-testing:cmuxTests/AppDelegateLaunchServicesRegistrationTests...
          - os_label: warp-macos-26-arm64-6x
            check_name: warp-macos-26-arm64-6x, 45, false, true, -only-testing:cmuxTests/BrowserPanelAddressBarFocusRequestTests...
    name: compat-tests (${{ matrix.check_name }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify compatibility attempt result
        run: |
          set -euo pipefail

          case "${{ matrix.os_label }}" in
            warp-macos-15-arm64-6x)
              ATTEMPT_1_RESULT="${{ needs.compat-tests-macos-15-attempt-1.result }}"
              ATTEMPT_1_COMPLETED="${{ needs.compat-tests-macos-15-attempt-1.outputs.completed }}"
              ATTEMPT_1_PASSED="${{ needs.compat-tests-macos-15-attempt-1.outputs.passed }}"
              ATTEMPT_2_RESULT="${{ needs.compat-tests-macos-15-attempt-2.result }}"
              ATTEMPT_2_COMPLETED="${{ needs.compat-tests-macos-15-attempt-2.outputs.completed }}"
              ATTEMPT_2_PASSED="${{ needs.compat-tests-macos-15-attempt-2.outputs.passed }}"
              ;;
            warp-macos-26-arm64-6x)
              ATTEMPT_1_RESULT="${{ needs.compat-tests-macos-26-attempt-1.result }}"
              ATTEMPT_1_COMPLETED="${{ needs.compat-tests-macos-26-attempt-1.outputs.completed }}"
              ATTEMPT_1_PASSED="${{ needs.compat-tests-macos-26-attempt-1.outputs.passed }}"
              ATTEMPT_2_RESULT="${{ needs.compat-tests-macos-26-attempt-2.result }}"
              ATTEMPT_2_COMPLETED="${{ needs.compat-tests-macos-26-attempt-2.outputs.completed }}"
              ATTEMPT_2_PASSED="${{ needs.compat-tests-macos-26-attempt-2.outputs.passed }}"
              ;;
            *)
              echo "Unknown compatibility runner ${{ matrix.os_label }}" >&2
              exit 1
              ;;
          esac

          scripts/verify_retry_result.sh \
            "Compatibility tests on ${{ matrix.os_label }}" \
            "$ATTEMPT_1_RESULT" "${ATTEMPT_1_COMPLETED:-}" "${ATTEMPT_1_PASSED:-}" \
            "$ATTEMPT_2_RESULT" "${ATTEMPT_2_COMPLETED:-}" "${ATTEMPT_2_PASSED:-}"
